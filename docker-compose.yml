name: policy-manus

services:
  # ==================== 基础设施 ====================

  policy-redis:
    image: redis:7.2-alpine
    container_name: policy-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - policy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  policy-postgres:
    # pgvector/pgvector:pg16 = 标准 PG16 + pgvector 扩展，用于 RAG 向量检索；
    # 与 postgres:16 数据目录兼容(同 PG16 大版本)
    image: pgvector/pgvector:pg16
    container_name: policy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-policy_manus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - policy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-policy_manus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== 沙箱服务 ====================

  policy-sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    image: policy-sandbox
    container_name: policy-sandbox
    restart: "no"
    networks:
      - policy-network

  # ==================== 后端 API ====================

  policy-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: policy-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: policy-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-policy_manus}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: policy-redis
      REDIS_PORT: 6379
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-policy-sandbox}
      SANDBOX_NETWORK: ${SANDBOX_NETWORK:-policy-network}
      SANDBOX_NAME_PREFIX: ${SANDBOX_NAME_PREFIX:-policy-sandbox}
    # 如需动态创建沙箱容器，取消以下注释以挂载 Docker Socket
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./api/config.yaml:/app/config.yaml  # 挂载配置文件，确保配置持久化到宿主机
    depends_on:
      policy-redis:
        condition: service_healthy
      policy-postgres:
        condition: service_healthy
    networks:
      - policy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ==================== 前端 UI ====================

  policy-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    container_name: policy-ui
    restart: unless-stopped
    depends_on:
      policy-api:
        condition: service_healthy
    networks:
      - policy-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ==================== Nginx 网关 ====================

  policy-nginx:
    image: nginx:alpine
    container_name: policy-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8088}:80"
      # 如需启用 HTTPS，取消以下注释
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # SSL 证书挂载（如需启用 HTTPS，取消以下注释）
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      policy-ui:
        condition: service_healthy
      policy-api:
        condition: service_healthy
    networks:
      - policy-network

# ==================== 数据卷 ====================
volumes:
  redis_data:
    name: policy-manus-redis-data
    driver: local
  postgres_data:
    name: policy-manus-postgres-data
    driver: local

# ==================== 网络 ====================
networks:
  policy-network:
    name: policy-network
    driver: bridge
