# ---------------------------------------------------------------
# Upstream 后端服务定义
# ---------------------------------------------------------------

upstream ui_backend {
    server policy-ui:3000;
}

upstream api_backend {
    server policy-api:8000;
}

# ---------------------------------------------------------------
# 主服务器配置
# ---------------------------------------------------------------

server {
    listen 80;
    server_name _;

    # ----------------------------------------------------------
    # API 接口代理（含 WebSocket / SSE 支持）
    # ----------------------------------------------------------
    location /api/ {
        proxy_pass http://api_backend/api/;
        proxy_http_version 1.1;

        # WebSocket 支持（VNC 等）
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 标准代理头
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / 长连接支持
        proxy_buffering off;
        proxy_cache     off;

        # 超时设置（WebSocket 与 SSE 需要长超时）
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_connect_timeout 60s;
    }

    # ----------------------------------------------------------
    # VNC WebSocket 代理（直接代理到沙箱服务）
    # 注意：API 服务已经处理了 VNC WebSocket 转发
    # 路径：/api/sessions/{session_id}/vnc
    # 如果需要直接访问沙箱 VNC，可以使用以下配置：
    # ----------------------------------------------------------
    # location /vnc/ {
    #     proxy_pass http://policy-sandbox:5901/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_read_timeout 86400s;
    #     proxy_send_timeout 86400s;
    # }

    # ----------------------------------------------------------
    # 前端 UI 代理
    # ----------------------------------------------------------
    location / {
        proxy_pass http://ui_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js HMR WebSocket（开发调试用）
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 超时设置
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ----------------------------------------------------------
    # 静态文件缓存优化
    # ----------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        proxy_pass http://ui_backend;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ----------------------------------------------------------
    # 错误页面
    # ----------------------------------------------------------
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
