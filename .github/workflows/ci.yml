name: CI

# 在向 main 提 PR 或推送到 main 时运行门禁检查
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 同一分支的新提交取消仍在跑的旧运行，节省额度
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  backend:
    name: backend (compile + unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pytest>=9.0.2"

      - name: Compile (syntax check)
        run: python -m compileall -q app core

      # 跑全部离线测试：领域单元 + 应用服务（用 fake UoW）+ 跨租户隔离 endpoint
      # 测试（TestClient + 依赖覆盖 + 内存仓储，不触发 lifespan）。
      # 唯一忽略 test_get_status：它经 lifespan 连真实 DB/Redis，待接入 service 容器再纳入。
      - name: Unit tests
        run: pytest tests --ignore=tests/app/interfaces/endpoints/test_status_routes.py

  integration:
    name: integration (db + repositories)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    # 真 Postgres + pgvector service 容器：覆盖仓储 SQL 层的跨租户隔离回归
    # (内存仓储测不到的那层)。镜像内置 vector 扩展，迁移 CREATE EXTENSION 可用。
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: policy_manus_itest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pytest>=9.0.2"

      # RUN_DB_TESTS=1 启用集成用例；POSTGRES_* 指向 service 容器。
      # 套件内 conftest 会建扩展 + alembic upgrade head + 跑真仓储隔离断言。
      - name: Integration tests (real Postgres + alembic + repositories)
        env:
          RUN_DB_TESTS: "1"
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: policy_manus_itest
        run: pytest tests/integration
