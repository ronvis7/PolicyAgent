name: CI

# 在向 main 提 PR 或推送到 main 时运行门禁检查
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 同一分支的新提交取消仍在跑的旧运行，节省额度
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  backend:
    name: backend (compile + unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pytest>=9.0.2"

      - name: Compile (syntax check)
        run: python -m compileall -q app core

      # 仅跑无需 DB/Redis/COS 的领域单元测试；
      # 依赖基础设施的接口集成测试待接入 service 容器后再纳入门禁。
      - name: Unit tests
        run: pytest tests/app/domain
